<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 15px; background: #f8f9fa; }
    .header { font-size: 18px; font-weight: bold; color: #003366; text-align: center; margin-bottom: 15px; border-bottom: 2px solid #e0e0e0; padding-bottom: 8px; }
    .card { padding: 15px; border-radius: 8px; color: white; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background-color: #6c757d; } /* Default loading gray */
    .verified { background-color: #2e7d32; } /* Indian Green for safe */
    .caution { background-color: #e65100; } /* Attention Orange for suspicious/caution */
    .unverified { background-color: #c62828; } /* Warning Red for unsafe */
    .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; margin-top: 10px; opacity: 0.9; }
    .value { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
    .score { font-size: 36px; font-weight: 900; margin: 10px 0; }
    .msg { font-size: 12px; font-style: italic; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 8px; }
  </style>
</head>
<body>
  <div class="header">🇮🇳 Bharat TrustNet</div>
  <div id="status-card" class="card">
    <div class="label">Verification Status</div>
    <div id="status-text" class="value">Checking...</div>
    
    <div class="label">Claimed Institution</div>
    <div id="institution" class="value">-</div>

    <div class="label">Trust Score</div>
    <div id="trust-score" class="score">-</div>

    <div id="message" class="msg">-</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
